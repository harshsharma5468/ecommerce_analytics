name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Lint & Format Checks
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      
      - name: Run flake8
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Check black formatting
        run: black src/ tests/ --check --verbose
      
      - name: Check import sorting
        run: isort src/ tests/ --check-only --verbose
      
      - name: Run type checking (mypy)
        run: mypy src/ --ignore-missing-imports || true

  # ──────────────────────────────────────────────────────────────────────────────
  # Unit & Integration Tests
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      
      - name: Set environment variables
        run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_NAME=ecommerce_analytics" >> $GITHUB_ENV
          echo "DB_USER=analytics_user" >> $GITHUB_ENV
          echo "DB_PASSWORD=analytics_pass" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "LOG_LEVEL=INFO" >> $GITHUB_ENV
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -n auto
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────────
  # Security Scanning
  # ──────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run bandit (SAST)
        run: bandit -r src/ -f json -o bandit-report.json || true
      
      - name: Check dependencies with safety
        run: safety check --json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────────────────────
  # Docker Build & Push
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push production image
        uses: docker/build-push-action@v4
        with:
          context: .
          target: production
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push development image (on develop branch)
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v4
        with:
          context: .
          target: development
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ──────────────────────────────────────────────────────────────────────────────
  # A/B Testing Engine Verification
  # ──────────────────────────────────────────────────────────────────────────────
  ab-test:
    name: A/B Testing Engine Verification
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_analytics
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set environment variables
        run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_NAME=ecommerce_analytics" >> $GITHUB_ENV
          echo "DB_USER=analytics_user" >> $GITHUB_ENV
          echo "DB_PASSWORD=analytics_pass" >> $GITHUB_ENV
          echo "LOG_LEVEL=INFO" >> $GITHUB_ENV
      
      - name: Run A/B Testing Engine
        run: |
          cd src/ab_testing
          python ab_engine.py
      
      - name: Verify outputs
        run: |
          test -f data/processed/ab_test_results.csv && echo "✓ CSV generated" || exit 1
          test -f data/processed/ab_test_results.parquet && echo "✓ Parquet generated" || exit 1
          test -f data/processed/ab_test_results.json && echo "✓ JSON generated" || exit 1
          echo "✓ All A/B test outputs verified"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ab-test-results
          path: data/processed/ab_test_results.*
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────────
  # Documentation Build & Deploy
  # ──────────────────────────────────────────────────────────────────────────────
  docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mkdocs mkdocs-material
      
      - name: Build documentation
        run: |
          # Generate dbt docs (if dbt installed)
          pip install dbt-core dbt-postgres || true
          mkdir -p docs/generated || true
          echo "Documentation placeholder" > docs/index.md
      
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  # ──────────────────────────────────────────────────────────────────────────────
  # Docker Compose Smoke Test
  # ──────────────────────────────────────────────────────────────────────────────
  docker-compose-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: docker build -t nexacommerce:test .
      
      - name: Run docker-compose validation
        run: |
          # Install docker-compose
          curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          
          # Validate docker-compose file
          docker-compose config > /dev/null
          echo "✓ docker-compose.yml is valid"

  # ──────────────────────────────────────────────────────────────────────────────
  # Final Summary
  # ──────────────────────────────────────────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, ab-test, docker-compose-test]
    if: always()
    
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" || \
                "${{ needs.ab-test.result }}" != "success" || \
                "${{ needs.docker-compose-test.result }}" != "success" ]]; then
            echo "❌ Some checks failed!"
            exit 1
          fi
          echo "✅ All checks passed!"
